<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>
  </head>
  <body>
    <header>
      <div class="header container">
        <div class="logo">
          <img src="./images/logo.svg" alt="logo" />
          <a class="name" href="./index.html">Mariam</a>
        </div>
        <nav class="nav">
          <ul class="nav-list">
            <li>
              <a href="index.html#about">About Me</a>
            </li>
            <li>
              <a href="index.html#projects">Projects</a>
            </li>
            <li>
              <a href="index.html#experience">Experience</a>
            </li>
            <li>
              <a href="index.html#contacts">Contacts</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="contacts-form container">
        <h1>Contact Me For More Details!</h1>
        <div class="input">
          <div>
            <h2>Name</h2>
            <input class="input-design" type="text" placeholder="John Doe" />
          </div>
          <div>
            <h2>Email</h2>
            <input
              class="input-design"
              type="email"
              placeholder="johndoe123@gmail.com"
            />
          </div>
          <div>
            <h2>Number</h2>
            <input
              class="input-design"
              type="tel"
              placeholder="+1 234 567 890"
            />
          </div>
          <div>
            <h2>Contact me</h2>
            <textarea
              class="message input-design"
              placeholder="Your message here."
            ></textarea>
            <button class="btn">Submit</button>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <div class="footer container">
        <div class="logo">
          <img src="./images/logo.svg" alt="logo" />
          <a class="name" href="./index.html">Mariam</a>
        </div>
        <div>
          <p>PORTFOLIO 2026</p>
        </div>
        <div class="socials">
          <a href="https://www.instagram.com/?hl=en" target="_blank"
            ><img src="./images/instagram.svg" alt="instagram"
          /></a>
          <a href="https://www.linkedin.com" target="_blank"
            ><img src="./images/linkedin.png" alt="linkedin" />
          </a>
          <a href="https://twitter.com" target="_blank"
            ><img src="./images/x.svg" alt="twitter" />
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
